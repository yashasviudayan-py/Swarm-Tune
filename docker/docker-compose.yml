name: swarm-tune

# ============================================================
# Shared environment variables (merged into each node's env block)
# YAML merge key (<<:) on a map merges at that level, so per-node
# environment blocks use <<: *shared-env to inherit these and then
# override only node-specific fields.
# ============================================================
x-shared-env: &shared-env
  SWARM_LOG_LEVEL: INFO
  SWARM_LOG_FORMAT: json
  SWARM_DEVICE: cpu
  SWARM_MODEL_NAME: "mlp"
  SWARM_LEARNING_RATE: "1e-4"
  SWARM_BATCH_SIZE: "8"
  SWARM_NUM_ROUNDS: "5000"
  SWARM_AGGREGATION_TIMEOUT_SECS: "10"
  SWARM_MIN_PEERS_FOR_ROUND: "2"
  # Bootstrap address for node_0.
  # node_0 runs with SWARM_NODE_KEY_SEED=swarm_bootstrap_node_0 so its
  # peer ID is deterministic across restarts.  Peer ID computed from seed:
  #   12D3KooWJWTRCtfVVBtPkDSjL8iy1ysM5WoQRdd5vLWVMrccePHU
  # discovery.py requires the /p2p/<PEER_ID> suffix for Noise handshake
  # verification — addresses without it are silently skipped.
  # pydantic_settings v2 expects list env vars as JSON arrays.
  SWARM_BOOTSTRAP_PEERS: '["/ip4/node_0/tcp/9000/p2p/12D3KooWJWTRCtfVVBtPkDSjL8iy1ysM5WoQRdd5vLWVMrccePHU"]'

# ============================================================
# Shared service configuration (build, volumes, network, restart)
# ============================================================
x-node-base: &node-base
  build:
    context: ..
    dockerfile: docker/Dockerfile
  restart: on-failure:3
  volumes:
    - ../data/shards:/app/data/shards:ro
    - node_logs:/app/logs
    - hf_cache:/root/.cache/huggingface  # shared HuggingFace model/dataset cache
  networks:
    - swarm_net
  depends_on:
    - node_0
  # Resource limits: prevent a single container from starving the host.
  # Adjust based on available hardware. These are conservative defaults
  # suitable for a 6-container sim on a 16-core / 32 GB dev machine.
  deploy:
    resources:
      limits:
        memory: 4G
        cpus: "2.0"

# ============================================================
# Services — 5 honest peer nodes + 1 adversarial node
# ============================================================
services:

  # node_0 is the bootstrap peer (like a BitTorrent tracker seed).
  # It is NOT a master — it is simply the first known address.
  # SWARM_NODE_KEY_SEED gives it a deterministic peer ID so the bootstrap
  # address in x-shared-env remains valid across container restarts.
  node_0:
    <<: *node-base
    container_name: swarm_node_0
    hostname: node_0
    depends_on: {}  # Override: bootstrap node has no dependencies
    environment:
      <<: *shared-env
      SWARM_NODE_ID: "node_0"
      SWARM_HOST: "0.0.0.0"
      SWARM_PORT: "9000"
      SWARM_NODE_KEY_SEED: "swarm_bootstrap_node_0"
      SWARM_BOOTSTRAP_PEERS: ""  # Override: bootstrap node needs no peers. env_ignore_empty=True handles this.
      SWARM_DATA_SHARD_PATH: "/app/data/shards/shard_0.pt"
      SWARM_MODEL_SHARD_INDEX: "0"
    ports:
      - "9000:9000"
      - "9100:9100"

  node_1:
    <<: *node-base
    container_name: swarm_node_1
    hostname: node_1
    environment:
      <<: *shared-env
      SWARM_NODE_ID: "node_1"
      SWARM_HOST: "0.0.0.0"
      SWARM_PORT: "9001"
      SWARM_DATA_SHARD_PATH: "/app/data/shards/shard_1.pt"
      SWARM_MODEL_SHARD_INDEX: "1"
    ports:
      - "9001:9001"
      - "9101:9101"

  node_2:
    <<: *node-base
    container_name: swarm_node_2
    hostname: node_2
    environment:
      <<: *shared-env
      SWARM_NODE_ID: "node_2"
      SWARM_HOST: "0.0.0.0"
      SWARM_PORT: "9002"
      SWARM_DATA_SHARD_PATH: "/app/data/shards/shard_2.pt"
      SWARM_MODEL_SHARD_INDEX: "2"
    ports:
      - "9002:9002"
      - "9102:9102"

  node_3:
    <<: *node-base
    container_name: swarm_node_3
    hostname: node_3
    environment:
      <<: *shared-env
      SWARM_NODE_ID: "node_3"
      SWARM_HOST: "0.0.0.0"
      SWARM_PORT: "9003"
      SWARM_DATA_SHARD_PATH: "/app/data/shards/shard_3.pt"
      SWARM_MODEL_SHARD_INDEX: "3"
    ports:
      - "9003:9003"
      - "9103:9103"

  node_4:
    <<: *node-base
    container_name: swarm_node_4
    hostname: node_4
    environment:
      <<: *shared-env
      SWARM_NODE_ID: "node_4"
      SWARM_HOST: "0.0.0.0"
      SWARM_PORT: "9004"
      SWARM_DATA_SHARD_PATH: "/app/data/shards/shard_4.pt"
      SWARM_MODEL_SHARD_INDEX: "4"
    ports:
      - "9004:9004"
      - "9104:9104"

  # node_5 is the adversarial peer — it broadcasts NaN-filled gradient
  # payloads every round to simulate a poisoning attack.
  # Honest nodes detect and reject its contributions via
  # GradientExtractor.validate() and continue training normally.
  # This is the Phase 4 adversarial security gate.
  node_5_adversarial:
    <<: *node-base
    container_name: swarm_node_5_adversarial
    hostname: node_5
    environment:
      <<: *shared-env
      SWARM_NODE_ID: "node_5_adversarial"
      SWARM_HOST: "0.0.0.0"
      SWARM_PORT: "9005"
      SWARM_DATA_SHARD_PATH: "/app/data/shards/shard_0.pt"  # real data irrelevant; gradients are poisoned
      SWARM_MODEL_SHARD_INDEX: "0"
      SWARM_ADVERSARIAL: "true"
    ports:
      - "9005:9005"
      - "9105:9105"

# ============================================================
# Networks & Volumes
# ============================================================
networks:
  swarm_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  node_logs:
  hf_cache:  # persistent HuggingFace cache so models/datasets survive container restarts
