<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 240" width="960" height="240">
  <defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>

    <!-- Hub -->
    <radialGradient id="hub" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="50%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>

    <!-- Peers -->
    <radialGradient id="np" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#e9d5ff"/>
      <stop offset="55%"  stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="nc" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#a5f3fc"/>
      <stop offset="55%"  stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </radialGradient>
    <radialGradient id="nt" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#99f6e4"/>
      <stop offset="55%"  stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </radialGradient>

    <filter id="hg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bloom"><feGaussianBlur stdDeviation="22"/></filter>
    <filter id="tglow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text gradient -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="60%"  stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>

    <!-- Subtle divider gradient -->
    <linearGradient id="div" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3b82f6" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>

    <!-- Spoke gradients for network — centred at (148,120) -->
    <linearGradient id="sg0" x1="148" y1="120" x2="148" y2="44"  gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg1" x1="148" y1="120" x2="214" y2="62"  gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg2" x1="148" y1="120" x2="224" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg3" x1="148" y1="120" x2="214" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg4" x1="148" y1="120" x2="148" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg5" x1="148" y1="120" x2="82"  y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg6" x1="148" y1="120" x2="72"  y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="sg7" x1="148" y1="120" x2="82"  y2="62"  gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.3"/>
    </linearGradient>

  </defs>

  <!-- Background -->
  <rect width="960" height="240" rx="20" fill="url(#bg)"/>
  <rect width="960" height="240" rx="20" fill="none" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>

  <!-- ── LEFT: Network diagram (centred at x=148, y=120, r=76) ── -->

  <!-- Bloom -->
  <circle cx="148" cy="120" r="40" fill="#3b82f6" opacity="0.18" filter="url(#bloom)"/>

  <!-- Guide ring -->
  <circle cx="148" cy="120" r="76" fill="none"
          stroke="#1e3a5f" stroke-width="0.7" opacity="0.35" stroke-dasharray="3 6"/>

  <!--
    8 peers at r=76:
      top        (148, 44)
      top-right  (214, 62)
      right      (224,120)
      bot-right  (214,178)
      bottom     (148,196)
      bot-left   ( 82,178)
      left       ( 72,120)
      top-left   ( 82, 62)
  -->

  <!-- Spokes -->
  <line x1="148" y1="120" x2="148" y2="44"  stroke="url(#sg0)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="214" y2="62"  stroke="url(#sg1)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="224" y2="120" stroke="url(#sg2)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="214" y2="178" stroke="url(#sg3)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="148" y2="196" stroke="url(#sg4)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="82"  y2="178" stroke="url(#sg5)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="72"  y2="120" stroke="url(#sg6)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="148" y1="120" x2="82"  y2="62"  stroke="url(#sg7)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Peer ring -->
  <polygon points="148,44 214,62 224,120 214,178 148,196 82,178 72,120 82,62"
           fill="none" stroke="#4f46e5" stroke-width="0.9" opacity="0.22"/>

  <!-- Cross diagonals -->
  <g stroke="#6366f1" stroke-width="0.5" opacity="0.09">
    <line x1="148" y1="44"  x2="224" y2="120"/>
    <line x1="224" y1="120" x2="148" y2="196"/>
    <line x1="148" y1="196" x2="72"  y2="120"/>
    <line x1="72"  y1="120" x2="148" y2="44"/>
    <line x1="214" y1="62"  x2="214" y2="178"/>
    <line x1="214" y1="178" x2="82"  y2="178"/>
    <line x1="82"  y1="178" x2="82"  y2="62"/>
    <line x1="82"  y1="62"  x2="214" y2="62"/>
  </g>

  <!-- Flow packets -->
  <g opacity="0.85">
    <circle cx="148" cy="82"  r="2.5" fill="#7dd3fc"/>
    <circle cx="181" cy="91"  r="2"   fill="#c4b5fd"/>
    <circle cx="186" cy="120" r="2.5" fill="#5eead4"/>
    <circle cx="181" cy="149" r="2"   fill="#d8b4fe"/>
    <circle cx="148" cy="158" r="2.5" fill="#67e8f9"/>
    <circle cx="115" cy="149" r="2"   fill="#5eead4"/>
    <circle cx="110" cy="120" r="2.5" fill="#c4b5fd"/>
    <circle cx="115" cy="91"  r="2"   fill="#67e8f9"/>
  </g>

  <!-- Peer nodes -->
  <g filter="url(#pg)">
    <circle cx="148" cy="44"  r="9" fill="url(#np)"/>
    <circle cx="214" cy="62"  r="9" fill="url(#nc)"/>
    <circle cx="224" cy="120" r="9" fill="url(#nt)"/>
    <circle cx="214" cy="178" r="9" fill="url(#np)"/>
    <circle cx="148" cy="196" r="9" fill="url(#nc)"/>
    <circle cx="82"  cy="178" r="9" fill="url(#nt)"/>
    <circle cx="72"  cy="120" r="9" fill="url(#np)"/>
    <circle cx="82"  cy="62"  r="9" fill="url(#nc)"/>
  </g>

  <!-- Hub -->
  <circle cx="148" cy="120" r="20" fill="url(#hub)" filter="url(#hg)"/>
  <circle cx="148" cy="120" r="20" fill="none" stroke="#bfdbfe" stroke-width="1" opacity="0.35"/>

  <!-- S monogram -->
  <path d="
    M 155.5 111
    C 155.5 109, 153.5 108, 150.5 108
    L 144 108
    C 140.5 108, 138 110, 138 113
    C 138 116, 140 117.5, 143.5 118.5
    L 152 120.5
    C 155.5 121.5, 157.5 123.5, 157.5 127
    C 157.5 130, 155 132, 151.5 132
    L 145 132
    C 141.5 132, 139.5 130.5, 139 129
  "
    fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Hub specular -->
  <circle cx="143" cy="114" r="4.5" fill="white" opacity="0.18"/>

  <!-- ── DIVIDER ── -->
  <line x1="270" y1="30" x2="270" y2="210" stroke="url(#div)" stroke-width="1"/>

  <!-- ── RIGHT: Typography ── -->

  <!-- "Swarm-Tune" logotype -->
  <text x="308" y="108"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="62"
    font-weight="700"
    letter-spacing="-1.5"
    fill="url(#tg)"
    filter="url(#tglow)"
  >Swarm-Tune</text>

  <!-- Tagline -->
  <text x="310" y="148"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="19"
    font-weight="400"
    letter-spacing="0.2"
    fill="#94a3b8"
  >The BitTorrent of AI training</text>

  <!-- Pill badges row -->
  <!-- Badge 1: P2P -->
  <rect x="310" y="170" width="58" height="26" rx="13" fill="#1e3a5f" opacity="0.8"/>
  <text x="339" y="187" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" fill="#93c5fd" letter-spacing="0.3">libp2p</text>

  <!-- Badge 2: PyTorch -->
  <rect x="376" y="170" width="66" height="26" rx="13" fill="#3b1a1a" opacity="0.8"/>
  <text x="409" y="187" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" fill="#fca5a5" letter-spacing="0.3">PyTorch</text>

  <!-- Badge 3: FedAvg -->
  <rect x="450" y="170" width="62" height="26" rx="13" fill="#1a1a3b" opacity="0.8"/>
  <text x="481" y="187" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" fill="#c4b5fd" letter-spacing="0.3">FedAvg</text>

  <!-- Badge 4: v1.0.0 -->
  <rect x="520" y="170" width="62" height="26" rx="13" fill="#0d2818" opacity="0.8"/>
  <text x="551" y="187" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" fill="#6ee7b7" letter-spacing="0.3">v 1.0.0</text>

  <!-- Badge 5: 110 tests -->
  <rect x="590" y="170" width="78" height="26" rx="13" fill="#0a2020" opacity="0.8"/>
  <text x="629" y="187" text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="600" fill="#5eead4" letter-spacing="0.3">110 tests</text>

</svg>
