name: Publish

# Triggered when a version tag is pushed: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ------------------------------------------------------------------
  # 1. Build and publish the Python package to PyPI
  # ------------------------------------------------------------------
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted OIDC publishing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install hatchling build

      - name: Build wheel and sdist
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure trusted publisher at https://pypi.org/manage/account/publishing/
        # Required settings on PyPI:
        #   Owner:      yashasviudayan-py
        #   Repository: Swarm-Tune
        #   Workflow:   publish.yml
        #   Environment: (leave blank)

  # ------------------------------------------------------------------
  # 2. Build and push the Docker image to Docker Hub
  #    Runs independently of PyPI — Docker image is useful even when
  #    PyPI publishing is not yet configured.
  # ------------------------------------------------------------------
  docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    # Intentionally no `needs: pypi` — Docker build is independent.
    # The image installs from source (COPY src/), not from PyPI.

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            yashasviudayan/swarm-tune:latest
            yashasviudayan/swarm-tune:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
