name: Chaos Tests

on:
  # Run chaos tests manually or on a schedule (nightly)
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily

jobs:
  chaos:
    name: Fault Injection Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run chaos tests
        run: pytest -m chaos -v --timeout=120 --tb=short --no-cov
